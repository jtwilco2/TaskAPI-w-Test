<div style="font-family: sans-serif; padding: 20px;">
  <h2>Task Manager Demo</h2>

  @if (loading) {
    <p>Loading tasks from .NET Backend...</p>
  }

  <div class="task-list">
    @for (task of tasks; track task.id) {
      <div style="margin-bottom: 10px; padding: 10px; border: 1px solid #ddd;">
        {{ task.title }} - 
        <strong>{{ task.isComplete ? '✅Done' : '⏳Pending' }}</strong>
      </div>
    } @empty {
      <p>No tasks found.</p>
    }
  </div>
</div>
